name: Auto Merge Conflict Resolver

on:
  workflow_dispatch:
    inputs:
      branch_to_merge:
        description: 'マージ元のブランチ名 (子ブランチ)'
        required: true
        default: 'develop'
  pull_request:
    branches:
      - main 
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  resolve-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge and Push
        env:
          INPUT_BRANCH: ${{ github.event.inputs.branch_to_merge }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          TARGET_BRANCH=${INPUT_BRANCH:-$PR_BRANCH}
          if [ -z "$TARGET_BRANCH" ]; then
            echo "Error: Branch name is empty. Please specify a branch."
            exit 1
          fi
          echo "Target branch: $TARGET_BRANCH"
          git fetch origin main $TARGET_BRANCH
          git checkout main
          git merge -X theirs origin/$TARGET_BRANCH
          git push origin main
